<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不備報告管理</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>不備報告管理</h1>

    <div class="info">
        <button onclick="loadReports()">再読み込み</button>

        <label style="display:block; margin-top:15px;">
            <input
                type="checkbox"
                id="showCompleted"
                onchange="renderReports()"
                style="width:auto;"
            >
            対応済みも表示する
        </label>

        <p id="countText"></p>
    </div>

    <div id="reportArea">読み込み中...</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyDLn3UccEHfvov-5wQ8X0IFgjZLPO7iHwniEB0zg0yH6ahLsRrZ1oTYduA8yF6dWIL/exec";

let allReports = [];

async function loadReports(){

    const area = document.getElementById("reportArea");
    area.innerHTML = "読み込み中...";

    try{

        const res = await fetch(API_URL + "?action=getReports");
        allReports = await res.json();

        renderReports();

    }catch(error){

        console.error(error);
        area.innerHTML = "<div class='info'>読み込みに失敗しました。</div>";
    }
}

function renderReports(){

    const area = document.getElementById("reportArea");
    const showCompleted =
        document.getElementById("showCompleted").checked;

    let reports = [...allReports];

    if(!showCompleted){
        reports = reports.filter(report =>
            report.status !== "対応済み"
        );
    }

    const totalCount = allReports.length;
    const visibleCount = reports.length;
    const completedCount = allReports.filter(r => r.status === "対応済み").length;
    const pendingCount = allReports.filter(r => r.status === "未対応").length;
    const workingCount = allReports.filter(r => r.status === "対応中").length;
    const rejectedCount = allReports.filter(r => r.status === "却下").length;

    document.getElementById("countText").innerText =
        `表示中：${visibleCount}件 / 全${totalCount}件　未対応：${pendingCount}件　対応中：${workingCount}件　対応済み：${completedCount}件　却下：${rejectedCount}件`;

    if(reports.length === 0){
        area.innerHTML = "<div class='info'>表示できる不備報告はありません。</div>";
        return;
    }

    reports.sort((a,b) => {
        if(a.status === "未対応" && b.status !== "未対応") return -1;
        if(a.status !== "未対応" && b.status === "未対応") return 1;

        if(a.status === "対応中" && b.status !== "対応中") return -1;
        if(a.status !== "対応中" && b.status === "対応中") return 1;

        return new Date(b.date) - new Date(a.date);
    });

    let html = "";

    reports.forEach(report => {

        html += `
            <div class="info reportCard" id="report_${report.row}">
                <h2>第${escapeHtml(report.round)}回　問${escapeHtml(report.questionNumber)}</h2>

                <p><strong>対応状況</strong><br>
                    <select id="status_${report.row}">
                        <option value="未対応" ${report.status === "未対応" ? "selected" : ""}>未対応</option>
                        <option value="対応中" ${report.status === "対応中" ? "selected" : ""}>対応中</option>
                        <option value="対応済み" ${report.status === "対応済み" ? "selected" : ""}>対応済み</option>
                        <option value="却下" ${report.status === "却下" ? "selected" : ""}>却下</option>
                    </select>
                </p>

                <p><strong>問題ID</strong><br>${escapeHtml(report.questionId)}</p>

                <p><strong>問題文</strong><br>${escapeHtml(report.questionText)}</p>

                <p><strong>ユーザーの回答</strong><br>${escapeHtml(report.userAnswer)}</p>

                <p><strong>正解</strong><br>${escapeHtml(report.correctAnswer)}</p>

                <p><strong>報告内容</strong><br>${escapeHtml(report.reportText)}</p>

                <p><strong>報告者</strong><br>${escapeHtml(report.nickname || "未入力")}</p>

                <button onclick="updateStatus(${report.row})">
                    状況を更新する
                </button>

                <button
                    onclick="openEditor('${escapeJs(report.questionId)}', ${report.row})"
                    style="background:#ff9800;"
                >
                    この問題を編集する
                </button>

                <div id="editor_${report.row}" style="display:none; margin-top:20px;"></div>
            </div>
        `;

    });

    area.innerHTML = html;
}

async function updateStatus(row){

    const status = document.getElementById(`status_${row}`).value;

    const data = {
        mode: "updateReportStatus",
        row: row,
        status: status
    };

    try{

        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        const report = allReports.find(r => Number(r.row) === Number(row));

        if(report){
            report.status = status;
        }

        alert("更新しました。");
        renderReports();

    }catch(error){

        console.error(error);
        alert("更新に失敗しました。");
    }
}

async function openEditor(questionId, reportRow){

    const editor = document.getElementById(`editor_${reportRow}`);

    if(editor.style.display === "block"){
        editor.style.display = "none";
        return;
    }

    editor.style.display = "block";
    editor.innerHTML = "<div class='info'>問題を読み込み中...</div>";

    try{

        const res = await fetch(
            API_URL + "?action=getQuestionById&id=" + encodeURIComponent(questionId)
        );

        const q = await res.json();

        if(!q || !q.row){
            editor.innerHTML =
                "<div class='info'>問題データを取得できませんでした。</div>";
            return;
        }

        editor.innerHTML = `
            <div class="info" style="background:#fffaf0;">
                <h3>問題編集</h3>

                <input type="hidden" id="edit_row_${reportRow}" value="${escapeHtml(q.row)}">

                <label>問題文</label>
                <textarea id="edit_question_${reportRow}" style="width:100%; min-height:100px;">${escapeHtml(q.question)}</textarea>

                <label>選択肢1</label>
                <input id="edit_choice1_${reportRow}" value="${escapeHtml(q.choice1)}">

                <label>選択肢2</label>
                <input id="edit_choice2_${reportRow}" value="${escapeHtml(q.choice2)}">

                <label>選択肢3</label>
                <input id="edit_choice3_${reportRow}" value="${escapeHtml(q.choice3)}">

                <label>選択肢4</label>
                <input id="edit_choice4_${reportRow}" value="${escapeHtml(q.choice4)}">

                <label>正解</label>
                <select id="edit_answer_${reportRow}">
                    <option value="1" ${String(q.answer) === "1" || String(q.answer) === "①" ? "selected" : ""}>①</option>
                    <option value="2" ${String(q.answer) === "2" || String(q.answer) === "②" ? "selected" : ""}>②</option>
                    <option value="3" ${String(q.answer) === "3" || String(q.answer) === "③" ? "selected" : ""}>③</option>
                    <option value="4" ${String(q.answer) === "4" || String(q.answer) === "④" ? "selected" : ""}>④</option>
                </select>

                <label>難易度</label>
                <input id="edit_difficulty_${reportRow}" value="${escapeHtml(q.difficulty)}">

                <label>確認状況</label>
                <select id="edit_status_${reportRow}">
                    <option value="未確認" ${q.status === "未確認" ? "selected" : ""}>未確認</option>
                    <option value="確認済み" ${q.status === "確認済み" ? "selected" : ""}>確認済み</option>
                    <option value="不採用" ${q.status === "不採用" ? "selected" : ""}>不採用</option>
                </select>

                <label>回</label>
                <input id="edit_round_${reportRow}" value="${escapeHtml(q.round)}">

                <label>カテゴリ</label>
                <select id="edit_section_${reportRow}">
                    ${sectionOption("初級", q.section)}
                    ${sectionOption("中級", q.section)}
                    ${sectionOption("上級", q.section)}
                    ${sectionOption("超上級", q.section)}
                    ${sectionOption("管理者問題①", q.section)}
                    ${sectionOption("管理者問題②", q.section)}
                </select>

                <button onclick="saveQuestion(${reportRow})">
                    問題を保存する
                </button>
            </div>
        `;

    }catch(error){

        console.error(error);
        editor.innerHTML =
            "<div class='info'>問題の読み込みに失敗しました。</div>";
    }
}

function sectionOption(value, current){
    return `<option value="${value}" ${value === current ? "selected" : ""}>${value}</option>`;
}

async function saveQuestion(reportRow){

    const row = document.getElementById(`edit_row_${reportRow}`).value;

    const data = {
        mode: "update",
        row: row,
        question: document.getElementById(`edit_question_${reportRow}`).value,
        choice1: document.getElementById(`edit_choice1_${reportRow}`).value,
        choice2: document.getElementById(`edit_choice2_${reportRow}`).value,
        choice3: document.getElementById(`edit_choice3_${reportRow}`).value,
        choice4: document.getElementById(`edit_choice4_${reportRow}`).value,
        answer: document.getElementById(`edit_answer_${reportRow}`).value,
        difficulty: document.getElementById(`edit_difficulty_${reportRow}`).value,
        status: document.getElementById(`edit_status_${reportRow}`).value,
        round: document.getElementById(`edit_round_${reportRow}`).value,
        section: document.getElementById(`edit_section_${reportRow}`).value
    };

    if(data.question.trim() === ""){
        alert("問題文を入力してください。");
        return;
    }

    if(data.choice1.trim() === "" || data.choice2.trim() === "" ||
       data.choice3.trim() === "" || data.choice4.trim() === ""){
        alert("選択肢をすべて入力してください。");
        return;
    }

    try{

        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        });

        alert("問題を保存しました。");

    }catch(error){

        console.error(error);
        alert("保存に失敗しました。");
    }
}

function escapeHtml(text){

    return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function escapeJs(text){

    return String(text || "")
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, "\\n")
        .replace(/\r/g, "");
}

loadReports();

</script>

</body>
</html>
