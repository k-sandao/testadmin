<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者メニュー</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>ぷよクエ共通テスト 管理者メニュー</h1>

    <p class="subtitle">
        問題管理・不備報告確認用ページ
    </p>

    <div class="info">
        <h2>管理メニュー</h2>

        <button onclick="location.href='admin.html'">
            問題を管理する
        </button>

        <button
            onclick="location.href='admin-report.html'"
            style="background:#ff9800;"
        >
            問い合わせを確認する
        </button>
    </div>

    <div class="info">
        <h2>各ページの説明</h2>

        <p>
            <strong>問題を管理する</strong><br>
            投稿された問題の確認、編集、採用・不採用、受験回への割り当てを行います。
        </p>

        <p>
            <strong>問い合わせを確認する</strong><br>
            受験者から送信された問題不備報告を確認し、対応状況の更新や問題の修正を行います。
        </p>
    </div>

</div>

</body>
</html>
